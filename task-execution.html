<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task execution — Rakuten AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="execution.css" />
  </head>
  <body data-i18n-title="page.title.exec">
    <div id="execRoot" class="exec-shell">
      <aside class="exec-sidebar">
        <div class="sidebar-top-row">
          <img src="rakuten-ai-logo.svg" alt="Rakuten AI" class="sidebar-logo" />
          <button type="button" class="sidebar-grid-btn" aria-label="Grid view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>
        </div>
        <button type="button" class="btn-new-chat" id="execSidebarHome">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span data-i18n="sidebar.newChat">New Chat</span>
        </button>
        <nav class="sidebar-nav">
          <div class="sidebar-section">
            <div class="sidebar-section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span data-i18n="sidebar.section.agents">Rakuten Agents</span>
            </div>
            <div class="sidebar-item"><span class="sidebar-item-icon">🛒</span><span data-i18n="nav.shopping">Shopping</span></div>
            <div class="sidebar-item"><span class="sidebar-item-icon">📦</span><span data-i18n="nav.rakuma">Rakuma</span></div>
            <div class="sidebar-item"><span class="sidebar-item-icon">👗</span><span data-i18n="nav.fashion">Fashion</span></div>
            <div class="sidebar-item"><span class="sidebar-item-icon">🎵</span><span data-i18n="nav.music">Music</span></div>
            <div class="sidebar-item"><span class="sidebar-item-icon">📱</span><span data-i18n="nav.mobile">Mobile</span></div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <span data-i18n="sidebar.section.essentials">Daily Essentials</span>
            </div>
            <div class="sidebar-item active"><span class="sidebar-item-icon">🔍</span><span data-i18n="nav.aiSearch">AI Search</span></div>
            <div class="sidebar-item"><span class="sidebar-item-icon">🖼</span><span data-i18n="nav.imageCreator">Image Creator</span></div>
            <div class="sidebar-item"><span class="sidebar-item-icon">🎬</span><span data-i18n="nav.videoCreator">Video Creator</span></div>
            <a href="voice-journal.html" class="sidebar-item sidebar-item-link"><span class="sidebar-item-icon">🎙</span><span data-i18n="nav.voiceJournal">Voice Journal</span></a>
            <div class="sidebar-item"><span class="sidebar-item-icon">🌐</span><span data-i18n="nav.aiTranslator">AI Translator</span></div>
            <div class="sidebar-item"><span class="sidebar-item-icon">🧩</span><span data-i18n="nav.problemSolver">Problem Solver</span></div>
          </div>
        </nav>
        <div class="sidebar-bottom">
          <div class="sidebar-link-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span data-i18n="sidebar.community">AI Community</span>
            <span class="sidebar-link-action" data-i18n="sidebar.enter">Enter ›</span>
          </div>
          <div class="sidebar-link-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span data-i18n="sidebar.recentChat">Recent chat</span>
            <span class="sidebar-link-action" data-i18n="sidebar.seeAll">See all ›</span>
          </div>
          <div class="lang-switcher">
            <button type="button" class="lang-toggle sidebar-footer-row">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
              <span class="lang-current">日本語</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="lang-dropdown hidden">
              <button type="button" class="lang-option" data-lang="ja">日本語</button>
              <button type="button" class="lang-option" data-lang="en">English</button>
            </div>
          </div>
        </div>
      </aside>

      <div class="exec-main">
        <header class="exec-top">
          <button type="button" class="exec-back-btn" id="execBackBtn" aria-label="Go back" title="Back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          </button>
          <h1 class="exec-top-title" id="execPageTitle">Task</h1>
          <div class="exec-top-actions" aria-label="Task actions">
            <a href="index.html#my-tasks" class="btn-my-task" id="headerMyTask">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              <span data-i18n="header.myTask">My Task</span>
            </a>
            <button type="button" class="btn-add-to-my-task" id="execSaveTask" title="Add to My Task" aria-label="Add to My Task">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              <span data-i18n="exec.addToMyTask">+ Add to My Task</span>
            </button>
          </div>
        </header>

        <div class="exec-feed" id="execFeed">
          <div class="exec-feed-inner" id="execFeedInner"></div>
        </div>

        <div class="exec-input-zone">
          <div class="exec-input-outer">
            <div class="exec-input-inner">
              <textarea
                class="exec-textarea"
                id="execTextarea"
                rows="2"
                placeholder="Input message here."
                data-i18n-placeholder="composer.placeholder"
                disabled
              ></textarea>
              <div class="conn-chip-bar" id="execConnChips"></div>
              <div class="exec-input-toolbar">
                <div class="exec-toolbar-left">
                  <span class="exec-select-mock" data-i18n="exec.fastResponse">&#9889; Fast Response &#9662;</span>
                  <button type="button" class="conn-trigger-btn" id="execConnBtn" aria-label="Manage connectors" title="Connectors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M8 2v6M16 2v6"/><rect x="4" y="8" width="16" height="8" rx="2"/><path d="M12 16v4"/><path d="M8 20h8"/></svg>
                    <span data-i18n="composer.connectors">Connectors</span>
                  </button>
                </div>
                <button type="button" class="exec-send" id="execSend" aria-label="Send" disabled>
                  &#10148;
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="exec-dock" id="execDock" aria-live="polite">
          <div class="exec-dock-status">
            <span aria-hidden="true">&#10024;</span>
            <span id="execDockText" data-i18n="exec.status.complete">Rakuten AI task replay completed.</span>
          </div>
          <div class="exec-dock-actions">
            <button type="button" class="btn-dock-secondary" id="execWatchAgain"><span data-i18n="exec.watchAgain">Watch again</span></button>
            <button type="button" class="btn-dock-primary" id="execTryYourself">
              <span data-i18n="exec.tryYourself">Try it yourself &#x1F44B;</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="data/tasks.js"></script>
    <script src="data/execution-scripts.js"></script>
    <script src="connectors.js"></script>
    <script src="execution-page.js?v=3"></script>
    <script>
      document.documentElement.lang = I18n.getLang();
      I18n.apply();
      I18n.initDropdown();
    </script>
  </body>
</html>
